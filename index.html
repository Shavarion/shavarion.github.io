<!DOCTYPE html>
<html>
<head>
    <title>Sine Wave Ball</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
        }
        #ball {
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="ball"></div>
    <script>
        const ball = document.getElementById('ball');
        let x = 0;

        function animate() {
            // Move ball horizontally
            x += 2;
            if (x > window.innerWidth) x = 0; // Reset when reaching screen edge

            // Calculate y position using sine wave
            const y = window.innerHeight / 2 + Math.sin(x * 0.01) * 100;

            // Update ball position
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
