<!DOCTYPE html>
<html>
<head>
	<title>Rotating Triangle</title>
</head>
<body>
<style>
.scroll-div {
  position: fixed;
  bottom: 0;
  height: 80%;
  overflow-y: scroll;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.scroll-div p {
  margin: 0;
  padding: 10px;
  font-size: 16px;
}

/* Control the speed of the scroll */
.scroll-div {
  animation: scroll 30s linear infinite;
}

@keyframes scroll {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(-80%);
  }
}
</style>
<div class="scroll-div">
  <p>Even more text here</p>
  <p>More text here</p>
  <p>Some text here</p>
</div>

</body>
</html>
